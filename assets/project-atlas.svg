<svg xmlns="http://www.w3.org/2000/svg" width="570" height="300" viewBox="0 0 570 300" role="img">
<title>Spotify Atlas</title>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#111827"/>
  </linearGradient>
  <linearGradient id="blueGlow" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#8aa4ff"/>
    <stop offset="100%" stop-color="#5470d8"/>
  </linearGradient>
  <linearGradient id="purpleGlow" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#b5b9ff"/>
    <stop offset="100%" stop-color="#7487e8"/>
  </linearGradient>
  <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="tinyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
    <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#233044" stroke-width="1" opacity="0.38"/>
  </pattern>
</defs>
