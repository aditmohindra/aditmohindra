<svg xmlns="http://www.w3.org/2000/svg" width="570" height="300" viewBox="0 0 570 300" role="img">
<title>Pokémon TCG Agentic AI</title>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#111827"/>
  </linearGradient>
  <linearGradient id="blueGlow" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#8aa4ff"/>
    <stop offset="100%" stop-color="#5470d8"/>
  </linearGradient>
